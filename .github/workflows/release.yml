name: Build & Publish APT Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Install toolchains
      - name: Install toolchains
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            gcc rustc nasm m4 \
            default-jdk \
            devscripts debhelper dpkg-dev \
            apt-utils gnupg

      # ── 3. Generate GPG key (using --quick-gen-key, modern & CI-safe)
      - name: Generate GPG key
        id: gpg
        run: |
          # Configure gpg for non-interactive use
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo 'allow-loopback-pinentry' > ~/.gnupg/gpg-agent.conf
          echo 'pinentry-mode loopback'  > ~/.gnupg/gpg.conf
          echo 'batch'                  >> ~/.gnupg/gpg.conf
          echo 'no-tty'                 >> ~/.gnupg/gpg.conf

          # Kill and restart agent with new config
          gpgconf --kill gpg-agent 2>/dev/null || true
          gpgconf --launch gpg-agent 2>/dev/null || true

          # --quick-gen-key: modern way, no passphrase, no agent dialog
          gpg --batch --passphrase '' \
            --quick-gen-key \
            'Subhobhai Sarkar <subhobhai943@users.noreply.github.com>' \
            rsa4096 sign 0

          # Get short key ID
          KEY_ID=$(gpg --list-keys --keyid-format SHORT \
            'subhobhai943@users.noreply.github.com' \
            | grep '^pub' | awk '{print $2}' | cut -d'/' -f2)
          echo "KEY_ID=$KEY_ID" >> $GITHUB_OUTPUT
          echo "Generated GPG key: $KEY_ID"

          # Export public key
          gpg --armor --export \
            'subhobhai943@users.noreply.github.com' > /tmp/sub.gpg.key
          echo "Public key exported."

      # ── 4. Build native backends
      - name: Build native backends
        run: make build

      # ── 5. Patch dispatcher paths for installed layout
      - name: Patch dispatcher paths
        run: |
          sed -i 's|${ROOT}/src/sub.py|/usr/local/lib/sub/sub.py|g' sub
          sed -i 's|${SUB_BIN:-${ROOT}/bin}|${SUB_BIN:-/usr/local/lib/sub/bin}|g' sub

      # ── 6. Build the .deb
      - name: Build .deb package
        run: |
          chmod +x sub
          dpkg-buildpackage -us -uc -b
          ls -lh ../sub_*.deb

      # ── 7. Upload .deb to GitHub Release
      - name: Upload .deb to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ../sub_*.deb

      # ── 8. Build & push APT repo to apt-repo branch
      - name: Publish APT repo
        env:
          KEY_ID: ${{ steps.gpg.outputs.KEY_ID }}
        run: |
          git config user.email "subhobhai943@users.noreply.github.com"
          git config user.name  "Subhobhai"

          DEB_FILE=$(basename $(ls ../sub_*.deb | head -1))
          cp "../sub_*.deb" "/tmp/$DEB_FILE" 2>/dev/null || \
            cp $(ls ../sub_*.deb | head -1) "/tmp/$DEB_FILE"

          # Switch to apt-repo branch (create orphan if first time)
          git fetch origin apt-repo 2>/dev/null && \
            git checkout apt-repo || \
            (git checkout --orphan apt-repo && git rm -rf . 2>/dev/null || true)

          mkdir -p dists/stable/main/binary-amd64 pool/main

          cp "/tmp/$DEB_FILE" pool/main/
          cp /tmp/sub.gpg.key sub.gpg.key

          # Packages index
          dpkg-scanpackages pool/main /dev/null \
            > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          # Release file header
          {
            echo "Origin: sub"
            echo "Label: sub"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: all amd64"
            echo "Components: main"
            echo "Description: sub - Polyglot hacking and utility CLI"
          } > dists/stable/Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          # Sign (no passphrase, loopback)
          gpg --batch --yes --passphrase '' --pinentry-mode loopback \
            --clearsign -o dists/stable/InRelease dists/stable/Release

          gpg --batch --yes --passphrase '' --pinentry-mode loopback \
            -abs -o dists/stable/Release.gpg dists/stable/Release

          # index.html
          cat > index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>sub APT Repository</title>
            <style>
              body { font-family: monospace; background:#0d1117; color:#c9d1d9; padding:2rem; }
              h1   { color:#58a6ff; }
              pre  { background:#161b22; padding:1rem; border-radius:6px; overflow-x:auto; }
              a    { color:#58a6ff; }
            </style>
          </head>
          <body>
            <h1>sub &mdash; APT Repository</h1>
            <p>Polyglot hacking &amp; utility CLI by
              <a href="https://github.com/subhobhai943">Subhobhai Sarkar</a>
            </p>
            <h2>Install</h2>
            <pre>
          curl -fsSL https://subhobhai943.github.io/sub/sub.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/sub.gpg

          echo "deb [signed-by=/etc/apt/keyrings/sub.gpg] https://subhobhai943.github.io/sub stable main" \
            | sudo tee /etc/apt/sources.list.d/sub.list

          sudo apt update
          sudo apt install sub
            </pre>
            <p><a href="https://github.com/subhobhai943/sub">GitHub &rarr;</a></p>
          </body>
          </html>
          HTML

          git add .
          git commit -m "APT repo: ${{ github.ref_name || 'manual' }}"
          git push origin apt-repo
