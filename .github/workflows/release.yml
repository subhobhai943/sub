name: Build & Publish APT Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install base toolchains
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential gcc rustc nasm m4 \
            default-jdk \
            devscripts debhelper dpkg-dev apt-utils gnupg \
            pciutils curl

      # ── Haxe ────────────────────────────────────────────────────────
      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: '4.3.4'

      - name: Install hxcpp (Haxe → C++ backend)
        run: haxelib install hxcpp --quiet

      # ── CUDA ────────────────────────────────────────────────────────
      - name: Install CUDA toolkit (nvcc)
        run: |
          sudo apt-get install -y nvidia-cuda-toolkit || \
          echo '[WARN] nvidia-cuda-toolkit unavailable — sub-cuda will be skipped'

      # ── Kotlin ──────────────────────────────────────────────────────
      - name: Install Kotlin
        run: |
          sudo apt-get install -y kotlin || \
          (sudo snap install kotlin --classic && echo 'kotlin installed via snap')

      - name: Generate GPG key
        id: gpg
        run: |
          gpgconf --kill gpg-agent 2>/dev/null || true
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo 'allow-loopback-pinentry' > ~/.gnupg/gpg-agent.conf
          printf 'pinentry-mode loopback\nbatch\nno-tty\n' > ~/.gnupg/gpg.conf
          gpgconf --launch gpg-agent 2>/dev/null || true
          sleep 1
          gpg --batch --passphrase '' --quick-generate-key \
            'Subhadip Sarkar <sarkarsubhadip604@gmail.com>' rsa4096 default never
          KEY_ID=$(gpg --list-keys --keyid-format SHORT sarkarsubhadip604@gmail.com \
            | grep '^pub' | awk '{print $2}' | cut -d'/' -f2)
          echo "KEY_ID=$KEY_ID" >> $GITHUB_OUTPUT
          gpg --armor --export sarkarsubhadip604@gmail.com > /tmp/sub.gpg.key

      - name: Build all native backends
        run: |
          make build
          echo '── Built binaries:'
          ls -lh bin/ || true

      - name: Verify Haxe binary built
        run: |
          [ -x bin/sub-haxe ] && echo '[OK] sub-haxe' || echo '[WARN] sub-haxe not built'

      - name: Verify CUDA binary built
        run: |
          [ -x bin/sub-cuda ] && echo '[OK] sub-cuda' || echo '[WARN] sub-cuda not built — gpuinfo falls back to nvidia-smi/lspci'

      - name: Patch dispatcher paths
        run: |
          sed -i 's|${ROOT}/src/sub.py|/usr/local/lib/sub/sub.py|g' sub
          sed -i 's|${SUB_BIN:-${ROOT}/bin}|${SUB_BIN:-/usr/local/lib/sub/bin}|g' sub

      - name: Build .deb package
        run: |
          chmod +x sub debian/rules
          dpkg-buildpackage -us -uc -b
          # Show what was produced (always in the parent of GITHUB_WORKSPACE)
          ls -lh "$GITHUB_WORKSPACE"/../sub_*.deb

      - name: Upload .deb to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "${{ github.workspace }}/../sub_*.deb"

      - name: Publish APT repo
        env:
          KEY_ID: ${{ steps.gpg.outputs.KEY_ID }}
        run: |
          set -euo pipefail
          git config user.email "sarkarsubhadip604@gmail.com"
          git config user.name "Subhadip Sarkar"

          # ── Locate the .deb (always one dir above GITHUB_WORKSPACE) ──
          DEB_FILE=$(ls "$GITHUB_WORKSPACE"/../sub_*.deb | head -1)
          DEB_BASENAME=$(basename "$DEB_FILE")

          # ── Use git worktree so we NEVER switch the main working tree ──
          # This completely avoids "untracked files would be overwritten".
          # We build the APT repo in /tmp/apt-repo-wt, which is a separate
          # checkout of the apt-repo branch inside the same .git database.
          WORKTREE="/tmp/apt-repo-wt"

          # Remove any leftover worktree from a previous failed run
          git worktree remove --force "$WORKTREE" 2>/dev/null || true
          rm -rf "$WORKTREE"

          if git ls-remote --exit-code origin apt-repo &>/dev/null; then
            # Branch already exists — add worktree pointing at it
            git fetch origin apt-repo
            git worktree add "$WORKTREE" apt-repo
          else
            # First run or branch was deleted — create a new empty orphan
            # worktree add doesn’t support orphan directly, so we:
            # 1. create the worktree with a temp branch
            # 2. delete all files and make an empty commit to start fresh
            git worktree add --orphan -b apt-repo "$WORKTREE"
            # The orphan worktree has no commits yet; remove any staged files
            cd "$WORKTREE"
            git rm -rf . 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi

          # ── Build the APT repo structure inside the worktree ─────────
          cd "$WORKTREE"

          mkdir -p dists/stable/main/binary-amd64 pool/main
          cp "$DEB_FILE" pool/main/
          cp /tmp/sub.gpg.key sub.gpg.key

          dpkg-scanpackages pool/main /dev/null \
            > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          printf '%s\n' \
            'Origin: sub' 'Label: sub' 'Suite: stable' 'Codename: stable' \
            'Architectures: all amd64' 'Components: main' \
            'Description: sub - Polyglot CLI' \
            > dists/stable/Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          gpg --batch --yes --passphrase '' --pinentry-mode loopback \
            --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --passphrase '' --pinentry-mode loopback \
            -abs -o dists/stable/Release.gpg dists/stable/Release

          cp "$GITHUB_WORKSPACE/.github/apt-repo-index.html" index.html

          # ── Commit and push ────────────────────────────────────
          git add .
          git commit -m "APT repo: ${{ github.ref_name || 'manual' }}"

          # On first push (no upstream), plain push creates the remote branch.
          # On subsequent pushes, force-with-lease is safe since only this
          # workflow ever writes to apt-repo.
          git push origin apt-repo 2>/dev/null || \
          git push --force-with-lease origin apt-repo

          # ── Clean up worktree ───────────────────────────────────
          cd "$GITHUB_WORKSPACE"
          git worktree remove --force "$WORKTREE"
