name: Build & Publish APT Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install base toolchains
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential gcc rustc nasm m4 \
            default-jdk \
            devscripts debhelper dpkg-dev apt-utils gnupg \
            pciutils curl

      # ── Haxe ────────────────────────────────────────────────────────
      # GitHub-hosted runners don't have haxe pre-installed.
      # We use the official HaxeFoundation setup action so sub-haxe
      # gets compiled and lands in bin/ before dpkg-buildpackage runs.
      - name: Install Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: '4.3.4'

      - name: Install hxcpp (needed to compile Haxe → C++ → binary)
        run: haxelib install hxcpp --quiet

      # ── CUDA ────────────────────────────────────────────────────────
      # nvidia-cuda-toolkit gives us nvcc on the runner.
      # The resulting sub-cuda binary is compiled for x86-64 Linux and
      # will only work on machines that have an NVIDIA GPU + driver, but
      # it's still correct to ship it in the package — the dispatcher
      # gracefully falls back to nvidia-smi / lspci if no GPU is present.
      - name: Install CUDA toolkit (nvcc)
        run: |
          sudo apt-get install -y nvidia-cuda-toolkit || \
          echo '[WARN] nvidia-cuda-toolkit unavailable on this runner — sub-cuda will be skipped'

      # ── Kotlin (kotlinc) ────────────────────────────────────────────
      - name: Install Kotlin
        run: |
          sudo apt-get install -y kotlin || \
          (sudo snap install kotlin --classic && echo 'kotlin installed via snap')

      - name: Generate GPG key
        id: gpg
        run: |
          gpgconf --kill gpg-agent 2>/dev/null || true
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo 'allow-loopback-pinentry' > ~/.gnupg/gpg-agent.conf
          printf 'pinentry-mode loopback\nbatch\nno-tty\n' > ~/.gnupg/gpg.conf
          gpgconf --launch gpg-agent 2>/dev/null || true
          sleep 1
          gpg --batch --passphrase '' --quick-generate-key 'Subhadip Sarkar <sarkarsubhadip604@gmail.com>' rsa4096 default never
          KEY_ID=$(gpg --list-keys --keyid-format SHORT sarkarsubhadip604@gmail.com | grep '^pub' | awk '{print $2}' | cut -d'/' -f2)
          echo "KEY_ID=$KEY_ID" >> $GITHUB_OUTPUT
          gpg --armor --export sarkarsubhadip604@gmail.com > /tmp/sub.gpg.key

      - name: Build all native backends
        run: |
          make build
          echo '── Built binaries:'
          ls -lh bin/ || true

      - name: Verify Haxe binary built
        run: |
          if [ ! -x bin/sub-haxe ]; then
            echo '[WARN] sub-haxe not built — check Haxe/hxcpp setup'
          else
            echo '[OK] sub-haxe present'
          fi

      - name: Verify CUDA binary built
        run: |
          if [ ! -x bin/sub-cuda ]; then
            echo '[WARN] sub-cuda not built — nvcc may be unavailable on this runner'
            echo '       The package will still ship; gpuinfo falls back to nvidia-smi/lspci'
          else
            echo '[OK] sub-cuda present'
          fi

      - name: Patch dispatcher paths
        run: |
          sed -i 's|${ROOT}/src/sub.py|/usr/local/lib/sub/sub.py|g' sub
          sed -i 's|${SUB_BIN:-${ROOT}/bin}|${SUB_BIN:-/usr/local/lib/sub/bin}|g' sub

      - name: Build .deb package
        run: |
          chmod +x sub debian/rules
          dpkg-buildpackage -us -uc -b
          ls -lh ../sub_*.deb

      - name: Upload .deb to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ../sub_*.deb

      - name: Publish APT repo
        env:
          KEY_ID: ${{ steps.gpg.outputs.KEY_ID }}
        run: |
          git config user.email "sarkarsubhadip604@gmail.com"
          git config user.name "Subhadip Sarkar"

          DEB_FILE=$(ls ../sub_*.deb | head -1)
          DEB_BASENAME=$(basename "$DEB_FILE")
          cp "$DEB_FILE" /tmp/

          cp .github/apt-repo-index.html /tmp/apt-repo-index.html

          git fetch origin apt-repo 2>/dev/null && git checkout apt-repo || (git checkout --orphan apt-repo && git rm -rf . 2>/dev/null || true)

          mkdir -p dists/stable/main/binary-amd64 pool/main
          cp "/tmp/$DEB_BASENAME" pool/main/
          cp /tmp/sub.gpg.key sub.gpg.key

          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

          printf 'Origin: sub\nLabel: sub\nSuite: stable\nCodename: stable\nArchitectures: all amd64\nComponents: main\nDescription: sub - Polyglot CLI\n' > dists/stable/Release
          apt-ftparchive release dists/stable >> dists/stable/Release

          gpg --batch --yes --passphrase '' --pinentry-mode loopback --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --passphrase '' --pinentry-mode loopback -abs -o dists/stable/Release.gpg dists/stable/Release

          cp /tmp/apt-repo-index.html index.html

          git add .
          git commit -m "APT repo: ${{ github.ref_name || 'manual' }}"
          git push origin apt-repo
