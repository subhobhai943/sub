name: Build & Release SUB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build All Binaries + .deb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            rustc \
            nasm \
            binutils \
            python3 \
            debhelper \
            dh-python

      - name: Build C scanner
        run: gcc -O2 -Wall -o src/core/sub-scan src/core/scanner.c

      - name: Build Rust recon
        run: rustc -O -o src/core/sub-recon src/core/recon.rs

      - name: Build Assembly sysinfo
        run: |
          nasm -f elf64 src/core/sysinfo.asm -o src/core/sysinfo.o
          ld -o src/core/sub-sysinfo src/core/sysinfo.o
          rm src/core/sysinfo.o

      - name: Build .deb package
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-package
          path: |
            dist/*.deb
            src/core/sub-scan
            src/core/sub-recon
            src/core/sub-sysinfo

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            src/core/sub-scan
            src/core/sub-recon
            src/core/sub-sysinfo
          body: |
            ## SUB ${{ github.ref_name }}

            Multi-language CLI tool: **Python · C · Rust · Assembly**

            ### Quick Install
            ```bash
            curl -sL https://raw.githubusercontent.com/subhobhai943/sub/main/install.sh | sudo bash
            ```

            ### Or install the .deb
            ```bash
            sudo dpkg -i sub_*.deb
            sudo apt-get install -f
            ```

            ### Commands
            | Command | Engine | Description |
            |---|---|---|
            | `sub scan <target>` | **C** | Fast TCP scan + banner grab |
            | `sub hashid <hash>` | **Rust** | Hash type identifier |
            | `sub pwcheck <pw>` | **Rust** | Password strength |
            | `sub subdomain <domain>` | **Rust** | Subdomain enumeration |
            | `sub caesar <text> <n>` | **Rust** | Caesar cipher |
            | `sub b64 <text>` | **Rust** | Base64 encode |
            | `sub rawsys` | **ASM** | Raw syscall sysinfo |
            | `sub whoami` | **Python** | Developer info |
            | `sub sysinfo` | **ASM/Python** | System info |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
