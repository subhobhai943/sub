name: Build & Release SUB

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build All (C + Rust + ASM + Kotlin + Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc rustc nasm binutils \
            python3 \
            default-jdk \
            debhelper dh-python

      - name: Install Kotlin
        run: |
          curl -sL https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip -o kotlin.zip
          unzip -q kotlin.zip -d /opt/kotlin
          echo "/opt/kotlin/kotlinc/bin" >> $GITHUB_PATH

      - name: Build C scanner
        run: gcc -O2 -Wall -o src/core/sub-scan src/core/scanner.c

      - name: Build Rust recon
        run: rustc -O -o src/core/sub-recon src/core/recon.rs

      - name: Build Assembly sysinfo
        run: |
          nasm -f elf64 src/core/sysinfo.asm -o src/core/sysinfo.o
          ld -o src/core/sub-sysinfo src/core/sysinfo.o
          rm src/core/sysinfo.o

      - name: Build Kotlin JAR
        run: kotlinc src/core/NetUtils.kt -include-runtime -d src/core/sub-net.jar

      - name: Build Java JAR
        run: |
          mkdir -p src/core/java_classes
          javac -d src/core/java_classes src/core/OsintTools.java
          jar cfe src/core/sub-osint.jar OsintTools -C src/core/java_classes .
          rm -rf src/core/java_classes

      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../*.deb dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-all
          path: |
            dist/*.deb
            src/core/sub-scan
            src/core/sub-recon
            src/core/sub-sysinfo
            src/core/sub-net.jar
            src/core/sub-osint.jar

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            src/core/sub-scan
            src/core/sub-recon
            src/core/sub-sysinfo
            src/core/sub-net.jar
            src/core/sub-osint.jar
          body: |
            ## SUB ${{ github.ref_name }}
            **6-language CLI toolkit: Python · C · Rust · Assembly · Kotlin · Java**

            ### Install
            ```bash
            curl -sL https://raw.githubusercontent.com/subhobhai943/sub/main/install.sh | sudo bash
            ```

            | Command | Engine | Description |
            |---|---|---|
            | `sub scan <target>` | C | Fast TCP + banner |
            | `sub netscan <host>` | Kotlin | Threaded scan |
            | `sub geoip <ip>` | Kotlin | IP geolocation |
            | `sub rdns <ip>` | Kotlin | Reverse DNS |
            | `sub grab <host> <port>` | Kotlin | Banner grab |
            | `sub traceroute <host>` | Kotlin | Traceroute |
            | `sub ifaces` | Kotlin | Network interfaces |
            | `sub username <name>` | Java | Username search |
            | `sub emailhdr <file>` | Java | Email header analysis |
            | `sub expand <url>` | Java | URL expander |
            | `sub httpstat <url>` | Java | HTTP fingerprint |
            | `sub hashid <hash>` | Rust | Hash identifier |
            | `sub pwcheck <pw>` | Rust | Password strength |
            | `sub subdomain <domain>` | Rust | Subdomain enum |
            | `sub caesar <text> <n>` | Rust | Caesar cipher |
            | `sub rawsys` | Assembly | Raw syscall info |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
