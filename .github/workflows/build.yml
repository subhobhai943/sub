name: Build & Release sub

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fpm
        run: |
          sudo apt-get install -y ruby ruby-dev
          sudo gem install fpm
      - name: Build .deb
        run: bash build.sh
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub-deb
          path: '*.deb'

  build-kotlin:
    name: Compile Kotlin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Kotlin
        run: sudo snap install kotlin --classic
      - name: Compile
        run: kotlinc src/kotlin/Sub.kt -include-runtime -d sub-kotlin.jar
      - name: Upload Kotlin JAR
        uses: actions/upload-artifact@v4
        with:
          name: sub-kotlin-jar
          path: sub-kotlin.jar

  build-java:
    name: Compile Java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Compile
        run: javac src/java/Sub.java -d out/
      - name: Package JAR
        run: |
          cd out
          jar cfe ../sub-java.jar Sub .
      - name: Upload Java JAR
        uses: actions/upload-artifact@v4
        with:
          name: sub-java-jar
          path: sub-java.jar
